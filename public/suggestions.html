<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Suggestion</title>
    <link rel="stylesheet" href="complaint.css" />
     <style>
      .flash-msg {
        position: fixed;
        top: 20px;
        right: 20px;
        background-color: #4CAF50; /* Green */
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        z-index: 9999;
        transition: all 0.4s ease-in-out;
      }
      
      .flash-msg.hidden {
        display: none;
      }
    </style>
  </head>

  <body>

    <nav>
      <ul class="navbar">
        <li><a href="home.html">Home</a></li>
        <li><a href="status_tracking.html">Check Status</a></li>
        <li><a href="help.html">Help & Support</
      </ul>
    </nav>

    <header class="animated-header">
      <h1 class="moving-text">Submit Your Suggestion</h1>
    </header>
  <div id="flashMsg" class="flash-msg hidden"></div>
    <div class="content">
      <form id="suggestionForm">
        <label for="category">Select Suggestion Category:</label>
        <select id="category" name="category" required>
          <option value="">--Select--</option>
          <option value="Academic Improvements">Academic Improvements</option>
          <option value="Campus Facilities">Campus Facilities</option>
          <option value="Student Services">Student Services</option>
          <option value="General Suggestions">General Suggestions</option>
        </select>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="5" required></textarea>

        <label for="name">Your Name (Optional):</label>
        <input type="text" id="name" name="name" />

        <label for="email">Your Email (Optional):</label>
        <input type="email" id="email" name="email" />

        <button type="submit">Submit Suggestion</button>
      </form>
    </div>

    <footer>
      <p>&copy; 2025 SAMADHAN PORTAL | A voice without FEAR!</p>
    </footer>
    <script src="complaint.js"></script>
  </body>
</html>
